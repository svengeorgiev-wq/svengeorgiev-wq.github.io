<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#073d35">
  <title>Krimi-Rätsel</title>
  <meta name="description" content="Leichte textbasierte Krimi-Rätsel zum Kombinieren und Ausschließen.">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="hero" aria-labelledby="app-title">
      <div class="hero__copy">
        <p class="edition">2026 Edition</p>
        <h1 id="app-title"><span>Krimi-</span><span>Rätsel</span></h1>
        <p class="subtitle">Leichte Fälle für ruhige Kombinationsgabe. Lies die Hinweise, streiche Unmögliches und entscheide dich erst, wenn alles zusammenpasst.</p>
        <div class="hero__actions">
          <button class="primary-action" type="button" id="newCaseButton">Neuer Fall</button>
          <button class="ghost-action" type="button" id="continueButton">Offenen Fall weiterlösen</button>
        </div>
      </div>
      <figure class="hero__cover">
        <img src="assets/cover.webp" alt="Cover Krimi-Rätsel">
      </figure>
    </section>

    <section class="case-stage" aria-live="polite">
      <aside class="case-list" aria-label="Fallauswahl">
        <div class="progress-card">
          <div>
            <span class="panel-label">Gelöst</span>
            <strong id="progressText">0/0</strong>
          </div>
          <div class="progress-track"><span id="progressFill"></span></div>
          <p id="progressMessage">Wähle den ersten Fall und sammle die Spuren.</p>
        </div>
        <div class="case-buttons" id="caseList"></div>
      </aside>

      <article class="case-card">
        <div class="case-header">
          <div>
            <p class="panel-label" id="caseMeta">Leicht</p>
            <h2 id="caseTitle">Der Fall</h2>
          </div>
          <span class="difficulty">Leicht</span>
        </div>

        <p class="case-text" id="caseIntro"></p>

        <div class="clue-panel">
          <div class="section-head">
            <h3>Hinweise</h3>
            <button class="small-action" type="button" id="revealClueButton">Nächster Hinweis</button>
          </div>
          <ol class="clue-list" id="clueList"></ol>
        </div>

        <div class="deduction-grid">
          <section class="option-panel">
            <h3>Verdächtige</h3>
            <div class="option-list" id="suspectOptions"></div>
          </section>
          <section class="option-panel">
            <h3>Beweisstück</h3>
            <div class="option-list" id="evidenceOptions"></div>
          </section>
        </div>

        <label class="field-label" for="guessInput">Deine Vermutung</label>
        <textarea id="guessInput" rows="4" placeholder="Wer war es, welches Beweisstück verrät es, und warum?"></textarea>

        <div class="case-actions">
          <button class="primary-action" type="button" id="checkButton">Prüfen</button>
          <button class="ghost-action" type="button" id="hintButton">Hinweis</button>
          <button class="ghost-action" type="button" id="solutionButton">Lösung anzeigen</button>
        </div>

        <div class="feedback" id="feedback" hidden></div>
      </article>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
