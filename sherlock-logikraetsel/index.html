<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Sherlock Holmes Logikraetsel: leichte und mittelschwere Textfaelle mit Loesung.">
    <title>Sherlock Logikraetsel</title>
    <link rel="preload" href="assets/sherlock-cover.png" as="image">
    <link rel="stylesheet" href="styles.css?v=7">
  </head>
  <body>
    <main class="shell">
      <section class="hero" aria-labelledby="app-title">
        <div class="hero-copy">
          <p class="edition">2026 Edition</p>
          <h1 id="app-title">Sherlock Logikraetsel</h1>
          <p class="subtitle">Textbasierte Faelle fuer ruhige Kombinationsgabe: leicht oder mittel, mit Loesung auf Wunsch.</p>
          <div class="controls" aria-label="Rätselsteuerung">
            <div class="segmented" role="group" aria-label="Schwierigkeit">
              <button class="segment active" data-difficulty="leicht" type="button">Leicht</button>
              <button class="segment" data-difficulty="mittel" type="button">Mittel</button>
            </div>
            <button id="new-puzzle" class="primary" type="button">Neuer Fall</button>
          </div>
        </div>
        <div class="cover-frame" aria-hidden="true">
          <img src="assets/sherlock-cover.png" alt="">
        </div>
      </section>

      <section class="case-file" aria-live="polite">
        <div class="case-header">
          <div>
            <p id="case-difficulty" class="case-tag">Leicht</p>
            <h2 id="case-title">Der Fall am Bahnhof</h2>
          </div>
          <p id="case-type" class="case-type">Ausschluss</p>
        </div>

        <article id="puzzle-text" class="puzzle-text"></article>

        <div class="answer-panel">
          <label for="user-answer">Deine Vermutung</label>
          <textarea id="user-answer" rows="3" placeholder="Notiere hier deine Schlussfolgerung..."></textarea>
        </div>

        <div class="actions">
          <button id="hint-button" class="secondary" type="button">Hinweis</button>
          <button id="solution-button" class="secondary" type="button" aria-expanded="false">Loesung anzeigen</button>
        </div>

        <div id="hint" class="reveal" hidden></div>
        <div id="solution" class="reveal solution" hidden></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
